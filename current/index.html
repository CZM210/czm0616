        async function verify() {
            const input = document.getElementById('pw').value;
            if(!input) return;
            const msg = document.getElementById('msg');
            const btn = document.getElementById('btn');
            msg.style.display = 'none';
            btn.disabled = true;

            try {
                const gasUrl = "https://script.google.com/macros/s/AKfycbyHII_jkRRoToGGhuJpgiZfiGnnbRm8vfrAt3aIL7gtmiOPkcpHQZRU9QeuLdv4yWcNvw/exec";

                const res = await fetch(`${gasUrl}?password=${encodeURIComponent(input)}&device=${encodeURIComponent(navigator.userAgent)}`);
                const result = await res.json();

                if (result.success === true) {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify({
                        auth: true,
                        expire: new Date().getTime() + EXPIRE_MS
                    }));
                    renderSystem();
                } else {
                    msg.style.display = 'block';
                    msg.innerText = "密碼錯誤";
                    btn.disabled = false;
                }
            } catch(e) { 
                alert("連線失敗，請聯繫開發者");
                btn.disabled = false;
            }
        }
        
        document.getElementById('pw').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') verify();
        });
