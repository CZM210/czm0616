
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>門市 DM 電子書</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/blasten/turn.js/turn.min.js"></script>
    <style>
        body { background: #1a1a1a; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        #viewport { width: 95vw; height: 85vh; display: flex; justify-content: center; align-items: center; position: relative; }
        #flipbook { box-shadow: 0 0 25px rgba(0,0,0,0.9); }
        .page { background: #000; overflow: hidden; }
        .page img { width: 100%; height: 100%; object-fit: contain; }
        .controls { position: fixed; bottom: 40px; display: flex; align-items: center; gap: 20px; z-index: 999; }
        .btn-main { padding: 15px 40px; font-size: 20px; font-weight: bold; border: none; border-radius: 50px; background: #ffbe00; color: #000; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .page-num { color: #fff; font-size: 18px; font-weight: bold; min-width: 80px; text-align: center; }
        .click-area { position: absolute; top: 0; width: 20%; height: 100%; z-index: 10; cursor: pointer; }
        .next-area { right: 0; }
        .prev-area { left: 0; }
    </style>
</head>
<body>
    <div id="viewport">
        <div class="click-area prev-area" onclick="$('#flipbook').turn('previous')"></div>
        <div class="click-area next-area" onclick="$('#flipbook').turn('next')"></div>
        <div id="flipbook"><div class="page"><img src="p_001.jpg"></div>\n            <div class="page"><img src="p_002.jpg"></div>\n            <div class="page"><img src="p_003.jpg"></div>\n            <div class="page"><img src="p_004.jpg"></div>\n            <div class="page"><img src="p_005.jpg"></div>\n            <div class="page"><img src="p_006.jpg"></div>\n            <div class="page"><img src="p_007.jpg"></div>\n            <div class="page"><img src="p_008.jpg"></div>\n            <div class="page"><img src="p_009.jpg"></div>\n            <div class="page"><img src="p_010.jpg"></div>\n            <div class="page"><img src="p_011.jpg"></div>\n            <div class="page"><img src="p_012.jpg"></div>\n            <div class="page"><img src="p_013.jpg"></div>\n            <div class="page"><img src="p_014.jpg"></div>\n            <div class="page"><img src="p_015.jpg"></div>\n            <div class="page"><img src="p_016.jpg"></div>\n            <div class="page"><img src="p_017.jpg"></div>\n            <div class="page"><img src="p_018.jpg"></div>\n            <div class="page"><img src="p_019.jpg"></div>\n            <div class="page"><img src="p_020.jpg"></div>\n            <div class="page"><img src="p_021.jpg"></div>\n            <div class="page"><img src="p_022.jpg"></div>\n            <div class="page"><img src="p_023.jpg"></div>\n            <div class="page"><img src="p_024.jpg"></div>\n            <div class="page"><img src="p_025.jpg"></div>\n            <div class="page"><img src="p_026.jpg"></div>\n            <div class="page"><img src="p_027.jpg"></div>\n            <div class="page"><img src="p_028.jpg"></div>\n            <div class="page"><img src="p_029.jpg"></div>\n            <div class="page"><img src="p_030.jpg"></div>\n            <div class="page"><img src="p_031.jpg"></div>\n            <div class="page"><img src="p_032.jpg"></div>\n            </div>
    </div>
    <div class="controls">
        <button class="btn-main" onclick="$('#flipbook').turn('previous')">⬅ 上一頁</button>
        <div class="page-num"><span id="cp">1</span> / 32</div>
        <button class="btn-main" onclick="$('#flipbook').turn('next')">下一頁 ➡</button>
    </div>
    <script>
        $(window).ready(function() {
            var ratio = 1.3993333333333333;
            function resizeBook() {
                var winW = $(window).width() * 0.95;
                var winH = $(window).height() * 0.8;
                var width, height;
                if (winW / winH > ratio * 2) {
                    height = winH;
                    width = height / ratio * 2;
                } else {
                    width = winW;
                    height = (width / 2) * ratio;
                }
                $('#flipbook').turn('size', width, height);
            }
            $('#flipbook').turn({
                acceleration: true, gradients: true, autoCenter: true, elevation: 50,
                when: { turned: function(e, page) { $('#cp').text(page); } }
            });
            resizeBook();
            $(window).resize(resizeBook);
        });
    </script>
</body>
</html>
