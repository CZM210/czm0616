<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POYA 查詢助手</title>
    <style>
        :root { --poya: #d63384; --border: #eee; --bg-memo: #fffde7; }
        body { font-family: "微軟正黑體", sans-serif; background: #fff; margin: 0; padding: 0; }
        
        .sticky-header { position: sticky; top: 0; background: #fff; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .search-box { display: flex; padding: 8px; }
        input { flex: 1; padding: 10px; font-size: 18px; border: 1px solid #ccc; border-radius: 4px; outline: none; }
        .btn-main { padding: 0 15px; background: var(--poya); color: white; border: none; border-radius: 4px; font-weight: bold; margin-left: 5px; }

        /* 模式切換 */
        .nav-row { display: flex; background: #fff; border-bottom: 2px solid var(--poya); }
        .nav-btn { flex: 1; padding: 12px 0; font-size: 15px; color: #666; border: none; background: none; font-weight: bold; cursor: pointer; }
        .nav-btn.active { color: var(--poya); border-bottom: 3px solid var(--poya); background: #fdf2f7; }

        /* 排序表頭 */
        .sort-row { display: flex; background: var(--poya); padding: 5px 0; }
        .sort-btn { flex: 1; padding: 6px 0; font-size: 13px; color: white; border: none; background: none; font-weight: bold; }

        /* 商品卡片樣式 */
        .item-row { padding: 12px 15px; border-bottom: 1px solid var(--border); position: relative; }
        .item-name { font-size: 16px; font-weight: bold; color: #000; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; margin-bottom: 4px; width: 80%; }
        .meta-line { font-size: 14px; color: #666; font-family: monospace; display: flex; gap: 10px; }
        
        /* 數量控制器 (暫存頁專用) */
        .qty-box { display: flex; align-items: center; margin-right: 10px; float: left; }
        .qty-btn { width: 28px; height: 28px; border: 1px solid #ddd; background: #fff; border-radius: 4px; font-weight: bold; color: var(--poya); font-size: 20px; line-height: 24px; text-align: center; }
        .qty-num { width: 30px; text-align: center; font-size: 18px; font-weight: bold; }

        /* 動作按鈕 */
        .btn-action { position: absolute; right: 15px; top: 12px; background: var(--poya); color: #fff; border: none; padding: 6px 10px; border-radius: 4px; font-size: 12px; }
        .btn-done { background: #4caf50; }
        .btn-remove { background: #999; }

        .memo-box { width: 100%; margin-top: 8px; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; box-sizing: border-box; background: var(--bg-memo); }
        .status-bar { padding: 5px; text-align: center; font-size: 12px; color: #999; background: #f9f9f9; border-bottom: 1px solid var(--border); }
        .highlight { color: var(--poya); background: #fff9c4; font-weight: bold; }
        .hidden { display: none; }
        .clearfix::after { content: ""; display: table; clear: both; }
    </style>
    
    <script type="text/javascript">
        var ALL_DATA = [], SEARCH_RESULTS = [], DIR = [1, 1, 1, 1];
        var MEMO_MAP = JSON.parse(localStorage.getItem('poya_memo_final') || '{}');

        window.onload = function() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', 'data.json?t=' + new Date().getTime(), true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState == 4 && xhr.status == 200) {
                    ALL_DATA = eval('(' + xhr.responseText + ')');
                    document.getElementById('status').innerHTML = "系統就緒";
                }
            };
            xhr.send();
            updateBadge();
        };

        function switchMode(m) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if(m === 'search') {
                document.getElementById('search-ui').classList.remove('hidden');
                document.getElementById('memo-ui').classList.add('hidden');
                document.getElementById('btn-search-tab').classList.add('active');
                renderSearch();
            } else {
                document.getElementById('search-ui').classList.add('hidden');
                document.getElementById('memo-ui').classList.remove('hidden');
                document.getElementById('btn-memo-tab').classList.add('active');
                renderMemo();
            }
        }

        function doSearch() {
            var val = document.getElementById('q').value.toUpperCase();
            if(!val) return;
            var q = val.split(' ');
            SEARCH_RESULTS = [];
            for (var i = 0; i < ALL_DATA.length; i++) {
                var r = ALL_DATA[i], t = (r[0]+r[1]+r[2]+r[3]).toUpperCase(), m = true;
                for (var j = 0; j < q.length; j++) { if (t.indexOf(q[j]) == -1) { m = false; break; } }
                if (m) { SEARCH_RESULTS.push(r); if (SEARCH_RESULTS.length >= 100) break; }
            }
            renderSearch();
            window.scrollTo(0,0);
        }

        function addToMemo(idx, btn) {
            var r = SEARCH_RESULTS[idx];
            var barcode = r[1];
            if(!MEMO_MAP[barcode]) {
                MEMO_MAP[barcode] = { dept: r[0], barcode: r[1], store: r[2], name: r[3], note: "", qty: 1 };
                saveSync();
                btn.innerHTML = "已存";
                btn.classList.add('btn-done');
            } else { alert("已在清單中"); }
        }

        function changeQty(id, delta) {
            if(MEMO_MAP[id]) {
                MEMO_MAP[id].qty += delta;
                saveSync();
                renderMemo();
            }
        }

        function updateNote(id, txt) {
            if(MEMO_MAP[id]) {
                MEMO_MAP[id].note = txt;
                localStorage.setItem('poya_memo_final', JSON.stringify(MEMO_MAP));
            }
        }

        function removeItem(id) {
            if(confirm('移除此商品？')) {
                delete MEMO_MAP[id];
                saveSync();
                renderMemo();
            }
        }

        function saveSync() {
            localStorage.setItem('poya_memo_final', JSON.stringify(MEMO_MAP));
            updateBadge();
        }

        function updateBadge() {
            var count = Object.keys(MEMO_MAP).length;
            document.getElementById('memo-count').innerHTML = count;
        }

        function renderSearch() {
            var h = '', q = document.getElementById('q').value.toUpperCase().split(' ');
            for (var i = 0; i < SEARCH_RESULTS.length; i++) {
                var r = SEARCH_RESULTS[i], name = r[3];
                for(var j=0; j<q.length; j++) { if(q[j]) name = name.replace(new RegExp("("+q[j]+")", "gi"), '<span class="highlight">$1</span>'); }
                var btnTxt = MEMO_MAP[r[1]] ? '已存' : '暫存';
                var btnCls = MEMO_MAP[r[1]] ? 'btn-done' : '';
                h += '<div class="item-row">';
                h += '<span class="item-name">' + name + '</span>';
                h += '<div class="meta-line"><div>' + r[0] + '</div><div>' + r[1] + '</div><div>' + r[2] + '</div></div>';
                h += '<button class="btn-action '+btnCls+'" onclick="addToMemo('+i+', this)">'+btnTxt+'</button>';
                h += '</div>';
            }
            document.getElementById('results').innerHTML = h;
            document.getElementById('status').innerHTML = "結果: " + SEARCH_RESULTS.length + " 筆";
        }

        function renderMemo() {
            var h = '', keys = Object.keys(MEMO_MAP);
            if(keys.length === 0) { h = '<div style="padding:50px;text-align:center;color:#999;">暫存清單是空的</div>'; }
            for (var i = 0; i < keys.length; i++) {
                var r = MEMO_MAP[keys[i]];
                h += '<div class="item-row clearfix">';
                h += '<div class="qty-box">';
                h += '<button class="qty-btn" onclick="changeQty(\''+r.barcode+'\', -1)">-</button>';
                h += '<div class="qty-num">' + r.qty + '</div>';
                h += '<button class="qty-btn" onclick="changeQty(\''+r.barcode+'\', 1)">+</button>';
                h += '</div>';
                h += '<span class="item-name">' + r.name + '</span>';
                h += '<div class="meta-line"><div>' + r.dept + '</div><div>' + r.barcode + '</div><div>' + r.store + '</div></div>';
                h += '<button class="btn-action btn-remove" onclick="removeItem(\''+r.barcode+'\')">移除</button>';
                h += '<textarea class="memo-box" placeholder="點擊輸入備註..." oninput="updateNote(\''+r.barcode+'\', this.value)">' + r.note + '</textarea>';
                h += '</div>';
            }
            document.getElementById('memo-results').innerHTML = h;
        }

        function sort(idx) {
            if(SEARCH_RESULTS.length == 0) return;
            var f = DIR[idx];
            SEARCH_RESULTS.sort(function(a, b) { var vA = a[idx], vB = b[idx]; return (isNaN(vA) ? vA.localeCompare(vB) : (vA - vB)) * f; });
            DIR[idx] *= -1;
            renderSearch();
        }
    </script>
</head>
<body>
    <div class="sticky-header">
        <div class="search-box">
            <input type="text" id="q" onkeypress="if(event.keyCode==13) doSearch();" placeholder="搜尋關鍵字...">
            <button class="btn-main" onclick="doSearch()">查詢</button>
        </div>
        <div class="nav-row">
            <button id="btn-search-tab" class="nav-btn active" onclick="switchMode('search')">搜尋結果</button>
            <button id="btn-memo-tab" class="nav-btn" onclick="switchMode('memo')">暫存清單 (<span id="memo-count">0</span>)</button>
        </div>
        <div id="search-ui">
            <div class="sort-row">
                <button class="sort-btn" onclick="sort(0)">部門 ↕</button>
                <button class="sort-btn" onclick="sort(1)">國碼 ↕</button>
                <button class="sort-btn" onclick="sort(2)">店碼 ↕</button>
                <button class="sort-btn" onclick="sort(3)">品名 ↕</button>
            </div>
            <div id="status" class="status-bar">就緒</div>
        </div>
    </div>
    <div id="results"></div>
    <div id="memo-ui" class="hidden">
        <div id="memo-results"></div>
    </div>
</body>
</html>
