<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>商品查詢器</title>
    <style>
        :root { --poya: #d63384; --border: #eee; --grey: #666; }
        body { font-family: -apple-system, "微軟正黑體", sans-serif; background: #fff; margin: 0; padding: 0; }
        
        /* 固定頂部區塊 */
        .sticky-header { position: sticky; top: 0; background: #fff; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .search-box { display: flex; padding: 8px; }
        input { flex: 1; padding: 12px; font-size: 18px; border: 1px solid #ccc; border-radius: 4px 0 0 4px; outline: none; -webkit-appearance: none; }
        .btn-search { padding: 0 15px; background: var(--poya); color: white; border: none; border-radius: 0 4px 4px 0; font-weight: bold; }

        /* 模式切換與排序列 */
        .nav-row { display: flex; background: #f9f9f9; border-bottom: 1px solid var(--border); }
        .nav-btn { flex: 1; padding: 10px 0; font-size: 14px; color: #555; border: none; background: none; font-weight: bold; cursor: pointer; }
        .nav-btn.active { color: var(--poya); border-bottom: 3px solid var(--poya); }

        .sort-row { display: flex; background: var(--poya); padding: 5px 0; }
        .sort-btn { flex: 1; padding: 8px 0; font-size: 13px; color: white; border: none; background: none; font-weight: bold; }

        .status-bar { padding: 6px; text-align: center; font-size: 12px; color: #999; background: #f9f9f9; border-bottom: 1px solid var(--border); }

        /* 商品清單列 */
        .item-row { padding: 12px 15px; border-bottom: 1px solid var(--border); position: relative; display: block; }
        
        /* 第一行：品名 (16px) */
        .item-name { 
            font-size: 16px; font-weight: bold; color: #000; 
            display: block; margin-bottom: 4px; width: 82%;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* 第二行：純數據對齊 (不顯示抬頭文字) */
        .meta-line { font-size: 14px; color: var(--grey); font-family: monospace; display: flex; }
        .v-dept { width: 45px; flex-shrink: 0; }
        .v-global { width: 125px; flex-shrink: 0; }
        .v-store { flex-grow: 1; }

        /* 暫存按鈕 (紅框位置) */
        .btn-memo { 
            position: absolute; right: 15px; top: 12px; 
            background: var(--poya); color: white; border: none; 
            padding: 6px 12px; border-radius: 4px; font-size: 13px; font-weight: bold;
        }
        .btn-del { background: #999; }

        /* Memo 筆記框 */
        .memo-input { 
            width: 100%; margin-top: 10px; padding: 10px; 
            border: 1px solid #ddd; border-radius: 6px; 
            font-size: 14px; box-sizing: border-box; background: #fffde7; 
            font-family: inherit;
        }

        .highlight { color: var(--poya); background: #fff9c4; font-weight: bold; }
        .hidden { display: none; }
    </style>
    
    <script type="text/javascript">
        var ALL = [], CUR = [], DIR = [1, 1, 1, 1];
        // 初始化暫存資料
        var MEMO_DATA = JSON.parse(localStorage.getItem('poya_memo_v2') || '{}');

        document.addEventListener('DOMContentLoaded', function() {
            loadData();
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').catch(function(err){ console.log(err); });
            }
            updateMemoBadge();
        });

        function loadData() {
            var statusTag = document.getElementById('status');
            statusTag.innerHTML = "正在連線資料夾...";
            var xhr = new XMLHttpRequest();
            xhr.open('GET', 'data.json?t=' + new Date().getTime(), true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState == 4 && xhr.status == 200) {
                    try {
                        ALL = JSON.parse(xhr.responseText);
                        statusTag.innerHTML = "系統就緒";
                    } catch (e) { statusTag.innerHTML = "❌ 資料格式錯誤"; }
                }
            };
            xhr.send();
        }

        // 模式切換：搜尋或暫存
        function switchMode(mode) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if(mode === 'search') {
                document.getElementById('search-ui').classList.remove('hidden');
                document.getElementById('memo-ui').classList.add('hidden');
                document.getElementById('btn-search-mode').classList.add('active');
                render();
            } else {
                document.getElementById('search-ui').classList.add('hidden');
                document.getElementById('memo-ui').classList.remove('hidden');
                document.getElementById('btn-memo-mode').classList.add('active');
                renderMemoPage();
            }
        }

        function doSearch() {
            var input = document.getElementById('q');
            var val = input.value.trim().toUpperCase();
            if(!val) { renderEmpty(); return; }
            input.blur();

            var q = val.split(/\s+/);
            CUR = [];
            for (var i = 0; i < ALL.length; i++) {
                var r = ALL[i];
                var t = (r[0] + r[1] + r[2] + r[3]).toUpperCase();
                var m = true;
                for (var j = 0; j < q.length; j++) { if (t.indexOf(q[j]) == -1) { m = false; break; } }
                if (m) { CUR.push(r); if (CUR.length >= 100) break; }
            }
            render();
            window.scrollTo(0,0);
        }

        // 存入暫存 (點擊紅框按鈕)
        function saveToMemo(idx) {
            var r = CUR[idx];
            var barcode = r[1];
            if(!MEMO_DATA[barcode]) {
                MEMO_DATA[barcode] = { dept: r[0], barcode: r[1], store: r[2], name: r[3], note: "" };
                syncStorage();
                alert("已加入暫存清單");
            } else { alert("此商品已在清單中"); }
        }

        function removeMemo(barcode) {
            if(confirm("確定刪除此暫存商品？")) {
                delete MEMO_DATA[barcode];
                syncStorage();
                renderMemoPage();
            }
        }

        function updateNote(barcode, text) {
            MEMO_DATA[barcode].note = text;
            localStorage.setItem('poya_memo_v2', JSON.stringify(MEMO_DATA));
        }

        function syncStorage() {
            localStorage.setItem('poya_memo_v2', JSON.stringify(MEMO_DATA));
            updateMemoBadge();
        }

        function updateMemoBadge() {
            document.getElementById('memo-count').innerHTML = Object.keys(MEMO_DATA).length;
        }

        function sort(idx) {
            if(CUR.length == 0) return;
            var f = DIR[idx];
            CUR.sort(function(a, b) {
                var vA = a[idx], vB = b[idx];
                return (isNaN(vA) ? String(vA).localeCompare(String(vB)) : (vA - vB)) * f;
            });
            DIR[idx] *= -1;
            render();
        }

        function render() {
            var h = '', val = document.getElementById('q').value.toUpperCase(), q = val.split(/\s+/);
            for (var i = 0; i < CUR.length; i++) {
                var r = CUR[i], name = r[3];
                for(var j=0; j<q.length; j++) {
                    if(q[j]) name = name.replace(new RegExp("("+q[j]+")", "gi"), '<span class="highlight">$1</span>');
                }
                h += '<div class="item-row">';
                h += '<span class="item-name">' + name + '</span>';
                h += '<div class="meta-line"><div class="v-dept">' + r[0] + '</div><div class="v-global">' + r[1] + '</div><div class="v-store">' + r[2] + '</div></div>';
                h += '<button class="btn-memo" onclick="saveToMemo('+i+')">暫存</button>';
                h += '</div>';
            }
            document.getElementById('results').innerHTML = h;
            document.getElementById('status').innerHTML = "搜尋結果: " + CUR.length + " 筆";
        }

        function renderMemoPage() {
            var h = '', keys = Object.keys(MEMO_DATA);
            if(keys.length === 0) { h = '<div style="padding:40px;text-align:center;color:#999;">暫存清單目前是空的</div>'; }
            for (var i = 0; i < keys.length; i++) {
                var r = MEMO_DATA[keys[i]];
                h += '<div class="item-row">';
                h += '<span class="item-name">' + r.name + '</span>';
                h += '<div class="meta-line"><div class="v-dept">' + r.dept + '</div><div class="v-global">' + r.barcode + '</div><div class="v-store">' + r.store + '</div></div>';
                h += '<button class="btn-memo btn-del" onclick="removeMemo(\''+r.barcode+'\')">刪除</button>';
                h += '<textarea class="memo-input" placeholder="點擊輸入備註 (如：貨架編號、待補數量...)" oninput="updateNote(\''+r.barcode+'\', this.value)">' + r.note + '</textarea>';
                h += '</div>';
            }
            document.getElementById('memo-list').innerHTML = h;
        }

        function renderEmpty() {
            document.getElementById('results').innerHTML = "";
            document.getElementById('status').innerHTML = "系統就緒";
        }
    </script>
</head>
<body>
    <div class="sticky-header">
        <div class="search-box">
            <input type="text" id="q" inputmode="search" onkeypress="if(event.keyCode==13) doSearch();" placeholder="請輸入關鍵字或條碼...">
            <button class="btn-search" onclick="doSearch()">查詢</button>
        </div>
        <div class="nav-row">
            <button id="btn-search-mode" class="nav-btn active" onclick="switchMode('search')">商品搜尋</button>
            <button id="btn-memo-mode" class="nav-btn" onclick="switchMode('memo')">我的暫存 (<span id="memo-count">0</span>)</button>
        </div>
        <div id="search-ui">
            <div class="sort-row">
                <button class="sort-btn" onclick="sort(0)">部門 ↕</button>
                <button class="sort-btn" onclick="sort(1)">國碼 ↕</button>
                <button class="sort-btn" onclick="sort(2)">店碼 ↕</button>
                <button class="sort-btn" onclick="sort(3)">品名 ↕</button>
            </div>
            <div id="status" class="status-bar">載入中...</div>
            <div id="results"></div>
        </div>
        <div id="memo-ui" class="hidden">
            <div class="status-bar">在此輸入備註會自動儲存</div>
            <div id="memo-list"></div>
        </div>
    </div>
</body>
</html>
