<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POYA 查詢助手</title>
    <style>
        :root { --poya: #d63384; --border: #eee; --bg-memo: #fffde7; }
        body { font-family: "微軟正黑體", sans-serif; background: #fff; margin: 0; padding: 0; }
        
        /* 固定頂部 */
        .sticky-header { position: sticky; top: 0; background: #fff; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .search-box { display: flex; padding: 8px; }
        input { flex: 1; padding: 10px; font-size: 18px; border: 1px solid #ccc; border-radius: 4px; outline: none; }
        .btn-main { padding: 0 15px; background: var(--poya); color: white; border: none; border-radius: 4px; font-weight: bold; margin-left: 5px; }

        .nav-row { display: flex; background: #f9f9f9; border-bottom: 1px solid var(--border); }
        .nav-btn { flex: 1; padding: 10px 0; font-size: 14px; color: #555; border: none; background: none; font-weight: bold; cursor: pointer; }
        .nav-btn.active { color: var(--poya); border-bottom: 3px solid var(--poya); }

        .sort-row { display: flex; background: var(--poya); padding: 5px 0; }
        .sort-btn { flex: 1; padding: 6px 0; font-size: 13px; color: white; border: none; background: none; font-weight: bold; }

        /* 清單共通樣式 */
        .item-card { padding: 12px 15px; border-bottom: 1px solid var(--border); position: relative; }

        /* 搜尋結果版面 */
        .search-layout { display: flex; justify-content: space-between; align-items: flex-start; }
        .item-name { font-size: 16px; font-weight: bold; color: #000; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; margin-bottom: 4px; width: 85%; }
        .meta-line { font-size: 14px; color: #666; font-family: "Courier New", monospace; display: flex; }
        .v-dept { width: 50px; flex-shrink: 0; } .v-global { width: 130px; flex-shrink: 0; } .v-store { flex-grow: 1; }

        /* 暫存按鈕 */
        .btn-action { background: var(--poya); color: #fff; border: none; padding: 6px 12px; border-radius: 4px; font-size: 13px; }
        .btn-action.done { background: #4caf50; }

        /* 暫存清單卡片版面 */
        .memo-layout { display: flex; flex-direction: column; }
        .memo-top-line { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
        
        /* 數量控制器 (左側) */
        .qty-box { display: flex; align-items: center; margin-right: 12px; }
        .qty-btn { width: 30px; height: 30px; border: 1px solid #ddd; background: #fff; border-radius: 4px; font-weight: bold; color: var(--poya); font-size: 20px; text-align: center; line-height: 26px; }
        .qty-num { width: 35px; text-align: center; font-size: 18px; font-weight: bold; color: #000; }

        /* 逐筆刪除鈕 (灰色) */
        .btn-remove { background: #999; color: white; border: none; padding: 4px 8px; border-radius: 4px; font-size: 12px; flex-shrink: 0; }

        /* 備註輸入框 */
        .memo-input { width: 100%; margin-top: 8px; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; box-sizing: border-box; background: var(--bg-memo); }

        .status-bar { padding: 4px; text-align: center; font-size: 12px; color: #999; background: #f5f5f5; }
        .highlight { color: var(--poya); background: #fff9c4; font-weight: bold; }
        .hidden { display: none; }
    </style>
    
    <script type="text/javascript">
        var ALL = [], CUR = [], DIR = [1, 1, 1, 1];
        var MEMO_MAP = JSON.parse(localStorage.getItem('poya_v5') || '{}');

        window.onload = function() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', 'data.json?t=' + new Date().getTime(), true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState == 4 && xhr.status == 200) {
                    ALL = eval('(' + xhr.responseText + ')');
                    document.getElementById('status').innerHTML = "系統就緒";
                }
            };
            xhr.send();
            updateCount();
        };

        function switchMode(m) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if(m === 'search') {
                document.getElementById('search-ui').classList.remove('hidden');
                document.getElementById('memo-ui').classList.add('hidden');
                document.getElementById('btn-search-mode').classList.add('active');
                renderSearch();
            } else {
                document.getElementById('search-ui').classList.add('hidden');
                document.getElementById('memo-ui').classList.remove('hidden');
                document.getElementById('btn-memo-mode').classList.add('active');
                renderMemoList();
            }
        }

        function doSearch() {
            var val = document.getElementById('q').value.toUpperCase();
            if(!val) return;
            var q = val.split(' ');
            CUR = [];
            for (var i = 0; i < ALL.length; i++) {
                var r = ALL[i], t = (r[0]+r[1]+r[2]+r[3]).toUpperCase(), m = true;
                for (var j = 0; j < q.length; j++) { if (t.indexOf(q[j]) == -1) { m = false; break; } }
                if (m) { CUR.push(r); if (CUR.length >= 100) break; }
            }
            renderSearch();
            window.scrollTo(0,0);
        }

        function save(idx, btn) {
            var r = CUR[idx];
            if(!MEMO_MAP[r[1]]) {
                MEMO_MAP[r[1]] = { dept: r[0], global: r[1], store: r[2], name: r[3], note: "", qty: 1 };
                sync();
                btn.innerHTML = "已存";
                btn.classList.add('done');
            } else { alert("已在清單中"); }
        }

        function changeQty(id, delta) {
            if(MEMO_MAP[id]) {
                MEMO_MAP[id].qty += delta;
                sync();
                renderMemoList();
            }
        }

        function updateNote(id, txt) {
            if(MEMO_MAP[id]) {
                MEMO_MAP[id].note = txt;
                localStorage.setItem('poya_v5', JSON.stringify(MEMO_MAP));
            }
        }

        function removeItem(id) {
            if(confirm('確定移除此筆商品？')) {
                delete MEMO_MAP[id];
                sync();
                renderMemoList();
            }
        }

        function sync() {
            localStorage.setItem('poya_v5', JSON.stringify(MEMO_MAP));
            updateCount();
        }

        function updateCount() {
            document.getElementById('memo-count').innerHTML = Object.keys(MEMO_MAP).length;
        }

        function renderSearch() {
            var h = '', q = document.getElementById('q').value.toUpperCase().split(' ');
            for (var i = 0; i < CUR.length; i++) {
                var r = CUR[i], name = r[3];
                for(var j=0; j<q.length; j++) { if(q[j]) name = name.replace(new RegExp("("+q[j]+")", "gi"), '<span class="highlight">$1</span>'); }
                var isSaved = MEMO_MAP[r[1]] ? 'done' : '';
                var btnTxt = MEMO_MAP[r[1]] ? '已存' : '暫存';
                h += '<div class="item-card search-layout"><div>';
                h += '<span class="item-name">' + name + '</span>';
                h += '<div class="meta-line"><div class="v-dept">' + r[0] + '</div><div class="v-global">' + r[1] + '</div><div class="v-store">' + r[2] + '</div></div>';
                h += '</div><button class="btn-action '+isSaved+'" onclick="save('+i+', this)">'+btnTxt+'</button></div>';
            }
            document.getElementById('results').innerHTML = h;
            document.getElementById('status').innerHTML = "結果: " + CUR.length + " 筆";
        }

        function renderMemoList() {
            var h = '', keys = Object.keys(MEMO_MAP);
            if(keys.length === 0) h = '<div style="padding:50px;text-align:center;color:#999;">暫存清單為空</div>';
            for (var i = 0; i < keys.length; i++) {
                var r = MEMO_MAP[keys[i]];
                h += '<div class="item-card memo-layout">';
                // 第一行：數量控制 + 品名 + 移除按鈕
                h += '<div class="memo-top-line">';
                h += '<div class="qty-box">';
                h += '<button class="qty-btn" onclick="changeQty(\''+r.global+'\',-1)">-</button>';
                h += '<div class="qty-num">' + r.qty + '</div>';
                h += '<button class="qty-btn" onclick="changeQty(\''+r.global+'\',1)">+</button>';
                h += '</div>';
                h += '<div style="flex:1;overflow:hidden;margin-right:8px;"><span class="item-name" style="width:100%">' + r.name + '</span></div>';
                h += '<button class="btn-remove" onclick="removeItem(\''+r.global+'\')">移除</button>';
                h += '</div>';
                // 第二行：數據對齊
                h += '<div class="meta-line"><div class="v-dept">' + r.dept + '</div><div class="v-global">' + r.global + '</div><div class="v-store">' + r.store + '</div></div>';
                // 第三行：備註框
                h += '<textarea class="memo-input" placeholder="點擊輸入備註..." oninput="updateNote(\''+r.global+'\', this.value)">' + r.note + '</textarea>';
                h += '</div>';
            }
            document.getElementById('memo-results').innerHTML = h;
        }

        function sort(idx) {
            if(CUR.length == 0) return;
            var f = DIR[idx];
            CUR.sort(function(a, b) { var vA = a[idx], vB = b[idx]; return (isNaN(vA) ? vA.localeCompare(vB) : (vA - vB)) * f; });
            DIR[idx] *= -1;
            renderSearch();
        }
    </script>
</head>
<body>
    <div class="sticky-header">
        <div class="search-box">
            <input type="text" id="q" onkeypress="if(event.keyCode==13) doSearch();" placeholder="搜尋關鍵字...">
            <button class="btn-main" onclick="doSearch()">查詢</button>
        </div>
        <div class="nav-row">
            <button id="btn-search-mode" class="nav-btn active" onclick="switchMode('search')">搜尋結果</button>
            <button id="btn-memo-mode" class="nav-btn" onclick="switchMode('memo')">暫存清單 (<span id="memo-count">0</span>)</button>
        </div>
        <div id="search-ui">
            <div class="sort-row">
                <button class="sort-btn" onclick="sort(0)">部門 ↕</button>
                <button class="sort-btn" onclick="sort(1)">國碼 ↕</button>
                <button class="sort-btn" onclick="sort(2)">店碼 ↕</button>
                <button class="sort-btn" onclick="sort(3)">品名 ↕</button>
            </div>
            <div id="status" class="status-bar">就緒</div>
        </div>
    </div>
    <div id="results"></div>
    <div id="memo-ui" class="hidden">
        <div id="memo-results"></div>
    </div>
</body>
</html>
