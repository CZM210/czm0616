<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>商品查詢器</title>
    <style>
        :root { --poya: #d63384; --border: #eee; }
        body { font-family: -apple-system, "微軟正黑體", sans-serif; background: #fff; margin: 0; padding: 0; }
        
        .sticky-header { position: sticky; top: 0; background: #fff; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .search-box { display: flex; padding: 8px; }
        input { flex: 1; padding: 12px; font-size: 18px; border: 1px solid #ccc; border-radius: 4px 0 0 4px; outline: none; -webkit-appearance: none; }
        .btn-search { padding: 0 15px; background: var(--poya); color: white; border: none; border-radius: 0 4px 4px 0; font-weight: bold; }

        .sort-row { display: flex; background: var(--poya); padding: 5px 0; }
        .sort-btn { flex: 1; padding: 10px 0; font-size: 13px; color: white; border: none; background: none; font-weight: bold; }

        .status-bar { padding: 8px; text-align: center; font-size: 12px; color: #999; background: #f9f9f9; border-bottom: 1px solid var(--border); }

        .item-row { padding: 12px 15px; border-bottom: 1px solid var(--border); display: block; }
        .item-name { font-size: 16px; font-weight: bold; color: #000; display: block; margin-bottom: 4px; word-break: break-all; }
        .meta-line { font-size: 14px; color: #666; font-family: monospace; display: flex; justify-content: space-between; }
        .highlight { color: var(--poya); background: #fff9c4; font-weight: bold; }
    </style>
    
    <script type="text/javascript">
        var ALL = [], CUR = [], DIR = [1, 1, 1, 1];

        // 使用更穩定的初始化方式
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
            // 註冊 PWA
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').catch(function(err){ console.log(err); });
            }
        });

        function loadData() {
            var statusTag = document.getElementById('status');
            statusTag.innerHTML = "正在連線資料夾...";
            
            var xhr = new XMLHttpRequest();
            // 加入時間戳避免 iPhone 強制讀取舊快取
            xhr.open('GET', 'data.json?t=' + new Date().getTime(), true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState == 4) {
                    if (xhr.status == 200) {
                        try {
                            // 改用 JSON.parse 捨棄危險的 eval
                            ALL = JSON.parse(xhr.responseText);
                            statusTag.innerHTML = "系統就緒";
                        } catch (e) {
                            statusTag.innerHTML = "❌ 資料格式錯誤，請檢查 data.json";
                        }
                    } else {
                        statusTag.innerHTML = "❌ 找不到 data.json (錯誤代碼: " + xhr.status + ")";
                    }
                }
            };
            xhr.send();
        }

        function doSearch() {
            var input = document.getElementById('q');
            var val = input.value.trim().toUpperCase();
            if(!val) { renderEmpty(); return; }
            
            // 讓手機輸入完自動收起鍵盤
            input.blur();

            var q = val.split(/\s+/); // 支援多個空格分割
            CUR = [];
            for (var i = 0; i < ALL.length; i++) {
                var r = ALL[i];
                var t = (r[0] + "" + r[1] + "" + r[2] + "" + r[3]).toUpperCase();
                var m = true;
                for (var j = 0; j < q.length; j++) { 
                    if (t.indexOf(q[j]) == -1) { m = false; break; } 
                }
                if (m) { CUR.push(r); if (CUR.length >= 150) break; }
            }
            render();
            window.scrollTo(0,0);
        }

        function sort(idx) {
            if(CUR.length == 0) return;
            var f = DIR[idx];
            CUR.sort(function(a, b) {
                var vA = a[idx], vB = b[idx];
                if (!isNaN(vA) && !isNaN(vB)) return (vA - vB) * f;
                return String(vA).localeCompare(String(vB)) * f;
            });
            DIR[idx] *= -1;
            render();
        }

        function render() {
            var resultsTag = document.getElementById('results');
            var val = document.getElementById('q').value.toUpperCase();
            var q = val.split(/\s+/);
            var h = '';
            
            for (var i = 0; i < CUR.length; i++) {
                var r = CUR[i], name = r[3];
                for(var j=0; j<q.length; j++) {
                    if(q[j]) {
                        var re = new RegExp("(" + q[j].replace(/[.*+?^${{}}()|[\]\\]/g, '\\$&') + ")", "gi");
                        name = name.replace(re, '<span class="highlight">$1</span>');
                    }
                }
                h += '<div class="item-row">';
                h += '<div class="item-name">' + name + '</div>';
                h += '<div class="meta-line">';
                h += '<span>部門: ' + r[0] + '</span>';
                h += '<span>國碼: ' + r[1] + '</span>';
                h += '<span>店碼: ' + r[2] + '</span>';
                h += '</div></div>';
            }
            resultsTag.innerHTML = h;
            document.getElementById('status').innerHTML = "搜尋結果: " + CUR.length + " 筆";
        }

        function renderEmpty() {
            document.getElementById('results').innerHTML = "";
            document.getElementById('status').innerHTML = "系統就緒";
        }
    </script>
</head>
<body>
    <div class="sticky-header">
        <div class="search-box">
            <input type="text" id="q" inputmode="search" onkeypress="if(event.keyCode==13) doSearch();" placeholder="請輸入關鍵字或條碼...">
            <button class="btn-search" onclick="doSearch()">查詢</button>
        </div>
        <div class="sort-row">
            <button class="sort-btn" onclick="sort(0)">部門 ↕</button>
            <button class="sort-btn" onclick="sort(1)">國碼 ↕</button>
            <button class="sort-btn" onclick="sort(2)">店碼 ↕</button>
            <button class="sort-btn" onclick="sort(3)">品名 ↕</button>
        </div>
        <div id="status" class="status-bar">系統載入中...</div>
    </div>
    <div id="results"></div>
</body>
</html>
