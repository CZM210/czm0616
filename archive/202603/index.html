<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>系統授權驗證</title>
    <style>
        /* 強制背景漆黑，防止後方選單穿透 */
        html, body { background: #000 !important; margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        
        #auth-overlay { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100vw; height: 100vh; 
            background: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            z-index: 2147483647; /* 使用 CSS 最高層級 */
            color: white;
            font-family: "Microsoft JhengHei", sans-serif;
        }
        .card { 
            background: #1a1a1a; 
            padding: 30px; 
            border-radius: 15px; 
            border: 1px solid #333; 
            width: 90%; 
            max-width: 350px; 
            text-align: center; 
            box-shadow: 0 10px 50px rgba(0,0,0,1); 
        }
        input { width: 100%; padding: 12px; margin: 20px 0; border: 1px solid #444; background: #222; color: #fff; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; text-align: center; }
        input:focus { border-color: #ff1744; }
        button { width: 100%; padding: 12px; background: #ff1744; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; }
        button:disabled { background: #555; cursor: not-allowed; }
        #msg { color: #ff5252; font-size: 14px; margin-top: 15px; display: none; }
        .loading { color: #00e5ff; font-size: 12px; display: none; margin-top: 10px; }
