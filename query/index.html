<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>商品查詢器-智慧版</title>
    <style>
        :root { --poya: #d63384; --border: #eee; --bg-memo: #fffde7; }
        body { font-family: "微軟正黑體", sans-serif; background: #fff; margin: 0; padding: 0; }
        
        .sticky-header { position: sticky; top: 0; background: #fff; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .search-box { display: flex; padding: 8px; }
        input { flex: 1; padding: 10px; font-size: 18px; border: 1px solid #ccc; border-radius: 4px; outline: none; }
        .btn-main { padding: 0 15px; background: var(--poya); color: white; border: none; border-radius: 4px; font-weight: bold; margin-left: 5px; }

        .nav-row { display: flex; background: #fff; border-bottom: 2px solid var(--poya); }
        .nav-btn { flex: 1; padding: 12px 0; font-size: 15px; color: #666; border: none; background: none; font-weight: bold; cursor: pointer; text-align: center; }
        .nav-btn.active { color: var(--poya); background: #fdf2f7; }

        .sort-row { display: flex; background: var(--poya); padding: 5px 0; }
        .sort-btn { flex: 1; padding: 6px 0; font-size: 13px; color: white; border: none; background: none; font-weight: bold; }

        .item-row { padding: 12px 15px; border-bottom: 1px solid var(--border); position: relative; background: #fff; }
        .item-name { font-size: 16px; font-weight: bold; color: #000; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; margin-bottom: 4px; width: 80%; }
        .meta-line { font-size: 14px; color: #666; font-family: monospace; display: flex; gap: 15px; }

        .btn-save { position: absolute; right: 15px; top: 12px; background: var(--poya); color: #fff; border: none; padding: 6px 12px; border-radius: 4px; font-size: 12px; }
        .btn-save.done { background: #4caf50; }
        .btn-remove { position: absolute; right: 10px; top: 12px; background: #999; color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 12px; }

        .memo-row { padding: 12px 10px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; background: #fff; position: relative; }
        .memo-input { width: 100%; margin-top: 5px; padding: 8px; border: 1px solid #ddd; border-radius: 4px; background: var(--bg-memo); font-size: 14px; box-sizing: border-box; }
        .status-bar { padding: 5px; text-align: center; font-size: 12px; color: #999; background: #f9f9f9; border-bottom: 1px solid var(--border); }
        .highlight { color: var(--poya); background: #fff9c4; font-weight: bold; }
        .hidden { display: none; }
        .tag-similar { color: #ff9800; font-size: 11px; font-weight: normal; margin-right: 4px; border: 1px solid #ff9800; padding: 0 2px; border-radius: 2px; }
    </style>
    
    <script type="text/javascript">
        var ALL = [], CUR = [], DIR = [1, 1, 1, 1];
        var MEMO = JSON.parse(localStorage.getItem('poya_v6') || '{}');
        
        var OLD_GAS_URL = "https://script.google.com/macros/s/AKfycbwPPvJqCN9WFnWCAW6TBWBBZNsQSlUWIouQcx8cR0OxFx_VNhghmBpVAeEs11xy_k22Tg/exec";
        var NEW_GAS_URL = "https://script.google.com/macros/s/AKfycbxa4ScSnIdj3RSWkGLY7w98UUCn5oHQf-Gx0Pp9UO6fDjMlOjWxWt9gUttekXVtc2fHmg/exec";

        window.onload = function() {
            fetch(NEW_GAS_URL + "?action=record&type=首頁訪問&content=進入查詢器頁面", { mode: 'no-cors' });
            var xhr = new XMLHttpRequest();
            xhr.open('GET', 'data.json?v=20260325_123', true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState == 4 && xhr.status == 200) {
                    ALL = eval('(' + xhr.responseText + ')');
                    document.getElementById('status').innerHTML = "系統就緒";
                }
            };
            xhr.send();
            updateBadge();
        };

        async function sendLog(q, count) {
            let userIp = "偵測失敗";
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                userIp = data.ip;
            } catch (e) { console.log("IP偵測跳過"); }
            let agent = navigator.userAgent.substring(0, 50);
            let oldUrl = OLD_GAS_URL + "?q=" + encodeURIComponent(q) + "&count=" + count + "&ip=" + userIp + "&agent=" + encodeURIComponent(agent);
            fetch(oldUrl, { mode: 'no-cors' });
            let detail = `關鍵字: [${q}] - 結果: ${count} 筆 - IP: ${userIp}`;
            let newUrl = NEW_GAS_URL + "?action=record&type=執行搜尋&content=" + encodeURIComponent(detail);
            fetch(newUrl, { mode: 'no-cors' });
        }

        function doSearch() {
            var val = document.getElementById('q').value.trim();
            if(!val) return;
            var cleanQuery = val.toUpperCase().replace(/[\s\+\-\/\(\)]+/g, '');
            var queryChars = Array.from(cleanQuery);
            CUR = [];
            for (var i = 0; i < ALL.length; i++) {
                var r = ALL[i];
                var t = (r[0]+r[1]+r[2]+r[3]).toUpperCase();
                var cleanName = t.replace(/[\s\+\-\/\(\)]+/g, '');
                var matchCount = 0;
                for (var j = 0; j < queryChars.length; j++) {
                    if (cleanName.indexOf(queryChars[j]) !== -1) matchCount++;
                }
                var score = queryChars.length > 0 ? (matchCount / queryChars.length) : 0;
                if (score >= 0.8 || cleanName.indexOf(cleanQuery) !== -1) {
                    var entry = r.slice();
                    entry.push(score); 
                    CUR.push(entry);
                    if (CUR.length >= 100) break;
                }
            }
            CUR.sort(function(a, b) { return b[4] - a[4]; });
            renderSearchPage();
            window.scrollTo(0,0);
            sendLog(val, CUR.length); 
        }

        function renderSearchPage() {
            var h = '', searchVal = document.getElementById('q').value.trim();
            var q = searchVal.toUpperCase().split(' ');
            for (var i = 0; i < CUR.length; i++) {
                var r = CUR[i], name = r[3], score = r[4];
                var rowBg = (score < 1) ? '#fff4e5' : '#ffffff';
                var smartTag = (score < 1) ? '<span class="tag-similar">相似</span>' : '';
                for(var j=0; j<q.length; j++) { 
                    if(q[j]) name = name.replace(new RegExp("("+q[j]+")", "gi"), '<span class="highlight">$1</span>'); 
                }
                var isSaved = MEMO[r[1]] ? 'done' : '';
                var btnTxt = MEMO[r[1]] ? '已存' : '暫存';
                h += '<div class="item-row" style="background:' + rowBg + ';">';
                h += '<span class="item-name">' + smartTag + name + '</span>';
                h += '<div class="meta-line"><div>' + r[0] + '</div><div>' + r[1] + '</div><div>' + r[2] + '</div></div>';
                h += '<button class="btn-save '+isSaved+'" onclick="save('+i+', this)">'+btnTxt+'</button>';
                h += '</div>';
            }
            document.getElementById('view-search').innerHTML = h;
            document.getElementById('status').innerHTML = "搜尋結果: " + CUR.length + " 筆";
        }

        function save(idx, btn) {
            var r = CUR[idx];
            var id = r[1];
            if(!MEMO[id]) {
                MEMO[id] = { d: r[0], g: r[1], s: r[2], n: r[3], note: "", qty: 0 };
                sync();
                btn.innerHTML = "已存";
                btn.classList.add('done');
            } else { alert("已在暫存清單中"); }
        }

        function sync() { localStorage.setItem('poya_v6', JSON.stringify(MEMO)); updateBadge(); }
        function updateBadge() { document.getElementById('memo-count').innerHTML = Object.keys(MEMO).length; }

        function switchTab(m) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if(m === 'search') {
                document.getElementById('ui-search-header').classList.remove('hidden');
                document.getElementById('ui-memo-header').classList.add('hidden');
                document.getElementById('tab-search').classList.add('active');
                document.getElementById('view-search').classList.remove('hidden');
                document.getElementById('view-memo').classList.add('hidden');
            } else {
                document.getElementById('ui-search-header').classList.add('hidden');
                document.getElementById('ui-memo-header').classList.remove('hidden');
                document.getElementById('tab-memo').classList.add('active');
                document.getElementById('view-search').classList.add('hidden');
                document.getElementById('view-memo').classList.remove('hidden');
                renderMemoPage();
            }
        }

        function renderMemoPage() {
            var h = '', keys = Object.keys(MEMO);
            if(keys.length === 0) h = '<div style="padding:50px;text-align:center;color:#999;">暫存清單是空的</div>';
            for (var i = 0; i < keys.length; i++) {
                var r = MEMO[keys[i]];
                h += '<div class="memo-row"><div class="memo-top">';
                h += '<div class="qty-box"><button class="qty-btn" onclick="changeQty(\''+r.g+'\',-1)">-</button><div class="qty-num">'+r.qty+'</div><button class="qty-btn" onclick="changeQty(\''+r.g+'\',1)">+</button></div>';
                h += '<div style="flex:1;overflow:hidden;"><span class="item-name" style="width:100%">' + r.n + '</span></div></div>';
                h += '<div class="meta-line"><div>' + r.d + '</div><div>' + r.g + '</div><div>' + r.s + '</div></div>';
                h += '<textarea class="memo-input" placeholder="備註..." oninput="updateNote(\''+r.g+'\', this.value)">' + r.note + '</textarea>';
                h += '<button class="btn-remove" onclick="remove(\''+r.g+'\')">移除</button></div>';
            }
            document.getElementById('view-memo').innerHTML = h;
        }

        function changeQty(id, delta) { if(MEMO[id]) { MEMO[id].qty += delta; sync(); renderMemoPage(); } }
        function updateNote(id, txt) { if(MEMO[id]) { MEMO[id].note = txt; localStorage.setItem('poya_v6', JSON.stringify(MEMO)); } }
        function remove(id) { if(confirm('確定移除？')) { delete MEMO[id]; sync(); renderMemoPage(); } }
        function sort(idx) {
            if(CUR.length == 0) return;
            var f = DIR[idx];
            CUR.sort(function(a, b) { 
                var vA = a[idx], vB = b[idx]; 
                return (isNaN(vA) ? String(vA).localeCompare(String(vB)) : (vA - vB)) * f; 
            });
            DIR[idx] *= -1;
            renderSearchPage();
        }
    </script>
</head>
<body>
    <div class="sticky-header">
        <div class="search-box">
            <input type="text" id="q" onkeypress="if(event.keyCode==13) doSearch();" placeholder="搜尋商品..『善用空格』">
            <button class="btn-main" onclick="doSearch()">查詢</button>
        </div>
        <div class="nav-row">
            <button id="tab-search" class="nav-btn active" onclick="switchTab('search')">搜尋結果</button>
            <button id="tab-memo" class="nav-btn" onclick="switchTab('memo')">暫存清單 (<span id="memo-count">0</span>)</button>
        </div>
        <div id="ui-search-header">
            <div class="sort-row">
                <button class="sort-btn" onclick="sort(0)">部門 ↕</button>
                <button class="sort-btn" onclick="sort(1)">國碼 ↕</button>
                <button class="sort-btn" onclick="sort(2)">店碼 ↕</button>
                <button class="sort-btn" onclick="sort(3)">品名 ↕</button>
            </div>
            <div id="status" class="status-bar">就緒</div>
        </div>
        <div id="ui-memo-header" class="hidden"><div class="status-bar">暫存商品可記錄備註</div></div>
    </div>
    <div id="view-search"></div>
    <div id="view-memo" class="hidden"></div>
</body>
</html>
