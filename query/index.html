<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>商品查詢器 v5.2</title>
    <style>
        :root { --poya: #d63384; --border: #eee; --bg-memo: #fffde7; }
        body { font-family: "微軟正黑體", sans-serif; background: #fff; margin: 0; padding: 0; }
        .sticky-header { position: sticky; top: 0; background: #fff; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .search-box { display: flex; padding: 8px; }
        input { flex: 1; padding: 10px; font-size: 18px; border: 1px solid #ccc; border-radius: 4px; outline: none; }
        .btn-main { padding: 0 15px; background: var(--poya); color: white; border: none; border-radius: 4px; font-weight: bold; margin-left: 5px; }
        .nav-row { display: flex; background: #fff; border-bottom: 2px solid var(--poya); }
        .nav-btn { flex: 1; padding: 12px 0; font-size: 15px; color: #666; border: none; background: none; font-weight: bold; cursor: pointer; text-align: center; }
        .nav-btn.active { color: var(--poya); background: #fdf2f7; }
        .sort-row { display: flex; background: var(--poya); padding: 5px 0; }
        .sort-btn { flex: 1; padding: 6px 0; font-size: 13px; color: white; border: none; background: none; font-weight: bold; }
        .item-row { padding: 12px 15px; border-bottom: 1px solid var(--border); position: relative; background: #fff; }
        .item-name { font-size: 16px; font-weight: bold; color: #000; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; margin-bottom: 4px; width: 80%; }
        .meta-line { font-size: 14px; color: #666; font-family: monospace; display: flex; gap: 15px; }
        .memo-row { padding: 12px 10px; border-bottom: 1px solid var(--border); background: #fff; position: relative; }
        .memo-top { display: flex; align-items: center; margin-bottom: 6px; }
        .qty-box { display: flex; align-items: center; margin-right: 12px; }
        .qty-btn { width: 30px; height: 30px; border: 1px solid #ddd; border-radius: 4px; color: var(--poya); font-weight: bold; cursor: pointer; text-align: center; line-height: 28px; background:#fff; }
        .qty-num { width: 35px; text-align: center; font-size: 18px; font-weight: bold; }
        .memo-input { width: 100%; margin-top: 8px; padding: 8px; border: 1px solid #ddd; border-radius: 4px; background: var(--bg-memo); font-size: 14px; box-sizing: border-box; resize: vertical; min-height: 40px; }
        .btn-save { position: absolute; right: 15px; top: 12px; background: var(--poya); color: #fff; border: none; padding: 6px 12px; border-radius: 4px; font-size: 12px; }
        .btn-save.done { background: #4caf50; }
        .btn-remove { position: absolute; right: 10px; top: 12px; background: #999; color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; }
        .highlight { color: var(--poya); background: #fff9c4; font-weight: bold; }
        .status-bar { padding: 5px 10px; font-size: 12px; background: #f8f9fa; border-bottom: 1px solid #eee; text-align: center; color: #666; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="sticky-header">
        <div class="search-box">
            <input type="text" id="q" onkeypress="if(event.keyCode==13) doSearch();" placeholder="貨價品名為主..">
            <button class="btn-main" onclick="doSearch()">查詢</button>
        </div>
        <div class="nav-row">
            <button id="tab-search" class="nav-btn active" onclick="switchTab('search')">搜尋結果</button>
            <button id="tab-memo" class="nav-btn" onclick="switchTab('memo')">暫存清單 (<span id="memo-count">0</span>)</button>
        </div>
        <div id="ui-search-header">
            <div class="sort-row">
                <button class="sort-btn" onclick="sort(0)">部門 ↕</button>
                <button class="sort-btn" onclick="sort(1)">國碼 ↕</button>
                <button class="sort-btn" onclick="sort(2)">店碼 ↕</button>
                <button class="sort-btn" onclick="sort(3)">品名 ↕</button>
            </div>
            <div id="status" class="status-bar">就緒 (v5.2)</div>
        </div>
        <div id="ui-memo-header" class="hidden"><div class="status-bar">暫存商品可加減數量與記錄備註</div></div>
    </div>
    <div id="view-search"></div>
    <div id="view-memo" class="hidden"></div>

    <script type="text/javascript">
        var ALL = [], CUR = [], DIR = [1, 1, 1, 1];
        var MEMO = JSON.parse(localStorage.getItem('poya_v6') || '{}');
        var OLD_GAS_URL = "https://script.google.com/macros/s/AKfycbwPPvJqCN9WFnWCAW6TBWBBZNsQSlUWIouQcx8cR0OxFx_VNhghmBpVAeEs11xy_k22Tg/exec";
        var NEW_GAS_URL = "https://script.google.com/macros/s/AKfycbxa4ScSnIdj3RSWkGLY7w98UUCn5oHQf-Gx0Pp9UO6fDjMlOjWxWt9gUttekXVtc2fHmg/exec";

        window.onload = function() {
            var DATA_VERSION = "20260407_v5.2";
            fetch('data.json?v=' + DATA_VERSION).then(res => res.json()).then(data => {
                ALL = data;
                document.getElementById('status').innerText = "系統就緒 (" + DATA_VERSION + ")";
            }).catch(e => {
                document.getElementById('status').innerText = "資料載入失敗，請檢查網路連線";
            });
            updateBadge();
        };

        // --- 發報系統 ---
        async function sendLog(q, count) {
            var userIp = "偵測失敗";
            try {
                var response = await fetch('https://api.ipify.org?format=json');
                var data = await response.json();
                userIp = data.ip;
            } catch (e) { console.log("IP API Timeout"); }
            var oldUrl = OLD_GAS_URL + "?q=" + encodeURIComponent(q) + "&count=" + count + "&ip=" + userIp;
            var newUrl = NEW_GAS_URL + "?action=record&type=查詢&content=" + encodeURIComponent("關鍵字: " + q + " | 結果: " + count + " | IP: " + userIp);
            new Image().src = oldUrl;
            new Image().src = newUrl;
        }

        // --- 核心演算法：支援國碼/店碼 + 雙重門檻 ---
        function calculateSmartRank(userInput, r) {
            var query = userInput.trim().toLowerCase();
            var itemName = r[3].toLowerCase();
            var barcode = r[1].toLowerCase();
            var storeCode = r[2].toLowerCase();

            // 1. 國碼或店碼精確/部分比對 (絕對最高分)
            if (barcode.includes(query) || storeCode.includes(query)) return 10000;

            var cleanName = itemName.replace(/[\s\+\-\/\(\)]+/g, '');
            var segments = query.match(/[\u4E00-\u9FA5]+|[a-z0-9]+/g);
            if (!segments) return 0;

            var totalScore = 0;
            var isStrictFail = false;
            var hasLongEnglishMatched = false;
            var matchedChars = 0;
            var totalDist = 0, lastIdx = -1;

            segments.forEach(seg => {
                var isEngNum = /^[a-z0-9]+$/.test(seg);
                var foundIdx = cleanName.indexOf(seg);

                if (isEngNum) {
                    if (foundIdx === -1) {
                        isStrictFail = true;
                    } else {
                        matchedChars += seg.length;
                        if (seg.length >= 4) hasLongEnglishMatched = true;
                        if (lastIdx !== -1) totalDist += Math.abs(foundIdx - lastIdx);
                        lastIdx = foundIdx;
                    }
                } else {
                    if (foundIdx !== -1) {
                        matchedChars += seg.length;
                        if (lastIdx !== -1) totalDist += Math.abs(foundIdx - lastIdx);
                        lastIdx = foundIdx;
                    } else {
                        var charMatch = 0;
                        for (let c of seg) {
                            let cIdx = cleanName.indexOf(c);
                            if (cIdx !== -1) {
                                charMatch++;
                                if (lastIdx !== -1) totalDist += Math.abs(cIdx - lastIdx);
                                lastIdx = cIdx;
                            }
                        }
                        var threshold = hasLongEnglishMatched ? 0.5 : 0.75;
                        if (charMatch / seg.length < threshold) {
                            isStrictFail = true;
                        } else {
                            matchedChars += charMatch;
                        }
                    }
                }
            });

            if (isStrictFail) return 0;
            // 緊湊度計算：字元距離越近分數越高
            var compactness = (totalDist > 0) ? (matchedChars / (matchedChars + totalDist)) : 1.0;
            return (matchedChars * 100) * compactness;
        }

        function doSearch() {
            var val = document.getElementById('q').value.trim();
            if(!val) return;
            CUR = [];
            for (var i = 0; i < ALL.length; i++) {
                var score = calculateSmartRank(val, ALL[i]);
                if (score > 0) {
                    var entry = ALL[i].slice();
                    entry.push(score);
                    CUR.push(entry);
                }
            }
            CUR.sort(function(a, b) { return b[4] - a[4]; });
            renderSearchPage();
            window.scrollTo(0,0);
            sendLog(val, CUR.length); 
        }

        function renderSearchPage() {
            var h = '', val = document.getElementById('q').value.trim();
            var q = val.match(/[\u4E00-\u9FA5]+|[a-z0-9]+/g) || [];
            
            for (var i = 0; i < CUR.length; i++) {
                var r = CUR[i];
                var name = r[3];
                // 安全的高光替換，防止正則符號崩潰
                q.forEach(word => { 
                    if(word) {
                        var safeQ = word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                        name = name.replace(new RegExp("("+safeQ+")", "gi"), '<span class="highlight">$1</span>'); 
                    }
                });
                var isSaved = MEMO[r[1]] ? 'done' : '';
                h += '<div class="item-row"><span class="item-name">'+name+'</span>';
                h += '<div class="meta-line"><div>'+r[0]+'</div><div>'+r[1]+'</div><div>'+r[2]+'</div></div>';
                h += '<button class="btn-save '+isSaved+'" onclick="save('+i+', this)">'+(MEMO[r[1]]?'已存':'暫存')+'</button></div>';
            }
            document.getElementById('view-search').innerHTML = h || '<div style="padding:50px;text-align:center;color:#999;">查無商品或未達相似度門檻</div>';
            document.getElementById('status').innerText = "命中結果: " + CUR.length + " 筆";
        }

        // --- 暫存器相關功能 ---
        function save(idx, btn) {
            var r = CUR[idx];
            if(!MEMO[r[1]]) {
                MEMO[r[1]] = { d: r[0], g: r[1], s: r[2], n: r[3], note: "", qty: 1 };
                sync();
                btn.innerText = "已存"; btn.classList.add('done');
            }
        }

        function renderMemoPage() {
            var h = '', keys = Object.keys(MEMO);
            if(keys.length === 0) h = '<div style="padding:50px;text-align:center;color:#999;">暫存清單是空的</div>';
            keys.forEach(id => {
                var r = MEMO[id];
                var qty = r.qty || 1; // 相容舊版資料
                var note = r.note || "";
                
                h += '<div class="memo-row"><div class="memo-top">';
                h += '<div class="qty-box"><button class="qty-btn" onclick="changeQty(\''+id+'\',-1)">-</button><div class="qty-num">'+qty+'</div><button class="qty-btn" onclick="changeQty(\''+id+'\',1)">+</button></div>';
                h += '<div style="flex:1;overflow:hidden;"><span class="item-name" style="width:100%">'+r.n+'</span></div></div>';
                h += '<div class="meta-line"><div>'+r.d+'</div><div>'+r.g+'</div><div>'+r.s+'</div></div>';
                h += '<textarea class="memo-input" placeholder="點擊記錄備註..." oninput="updateNote(\''+id+'\', this.value)">'+note+'</textarea>';
                h += '<button class="btn-remove" onclick="remove(\''+id+'\')">移除</button></div>';
            });
            document.getElementById('view-memo').innerHTML = h;
        }

        function changeQty(id, delta) { 
            if(MEMO[id]) { 
                MEMO[id].qty = Math.max(0, (MEMO[id].qty || 1) + delta); 
                sync(); 
                renderMemoPage(); 
            } 
        }
        
        function updateNote(id, txt) { 
            if(MEMO[id]) { 
                MEMO[id].note = txt; 
                localStorage.setItem('poya_v6', JSON.stringify(MEMO)); // 不呼叫sync避免中斷輸入
            } 
        }
        
        function remove(id) { 
            if(confirm('確定移除此項商品？')) { 
                delete MEMO[id]; 
                sync(); 
                renderMemoPage(); 
            } 
        }
        
        function sync() { 
            localStorage.setItem('poya_v6', JSON.stringify(MEMO)); 
            updateBadge(); 
        }
        
        function updateBadge() { 
            document.getElementById('memo-count').innerText = Object.keys(MEMO).length; 
        }

        // --- UI 切換與排序 ---
        function switchTab(m) {
            document.getElementById('tab-search').classList.toggle('active', m === 'search');
            document.getElementById('tab-memo').classList.toggle('active', m === 'memo');
            document.getElementById('view-search').classList.toggle('hidden', m !== 'search');
            document.getElementById('view-memo').classList.toggle('hidden', m !== 'memo');
            document.getElementById('ui-search-header').classList.toggle('hidden', m !== 'search');
            document.getElementById('ui-memo-header').classList.toggle('hidden', m !== 'memo');
            if(m === 'memo') renderMemoPage();
        }

        function sort(idx) {
            if(CUR.length == 0) return;
            var f = DIR[idx];
            CUR.sort(function(a, b) { 
                var vA = a[idx], vB = b[idx];
                return (isNaN(vA) ? String(vA).localeCompare(String(vB)) : (vA - vB)) * f;
            });
            DIR[idx] *= -1;
            renderSearchPage();
        }
    </script>
</body>
</html>
