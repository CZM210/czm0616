<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POYA 商品查詢</title>
    <style>
        :root { --poya: #d63384; --border: #eee; }
        body { font-family: "微軟正黑體", sans-serif; background: #fff; margin: 0; padding: 0; }
        
        /* 置頂區域 */
        .sticky-header { position: sticky; top: 0; background: #fff; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .search-box { display: flex; padding: 8px; }
        input { flex: 1; padding: 10px; font-size: 18px; border: 1px solid #ccc; border-radius: 4px 0 0 4px; outline: none; }
        .btn-search { padding: 0 15px; background: var(--poya); color: white; border: none; border-radius: 0 4px 4px 0; font-weight: bold; }

        /* 排序表頭 */
        .sort-row { display: flex; background: var(--poya); padding: 5px 0; }
        .sort-btn { flex: 1; padding: 6px 0; font-size: 13px; color: white; border: none; background: none; font-weight: bold; }

        .status-bar { padding: 4px; text-align: center; font-size: 12px; color: #999; background: #f9f9f9; border-bottom: 1px solid var(--border); }

        /* 內容清單 */
        .item-row { padding: 10px 15px; border-bottom: 1px solid var(--border); display: block; }

        /* 第一行：品名 (16px, 單行) */
        .item-name { 
            font-size: 16px; 
            font-weight: bold; 
            color: #000; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            display: block;
            margin-bottom: 4px;
        }

        /* 第二行：純內文數據 (絕對對齊) */
        .meta-line { 
            font-size: 14px; 
            color: #666; 
            font-family: "Courier New", monospace; /* 使用等寬字體，數字更整齊 */
            display: flex;
        }
        .v-dept { width: 50px; flex-shrink: 0; }        /* 部門寬度 */
        .v-global { width: 130px; flex-shrink: 0; }      /* 國碼寬度 */
        .v-store { flex-grow: 1; }                      /* 店碼寬度 */

        .highlight { color: var(--poya); background: #fff9c4; font-weight: bold; }
    </style>
    
    <script type="text/javascript">
        var ALL = [], CUR = [], DIR = [1, 1, 1, 1];

        window.onload = function() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', 'data.json?t=' + new Date().getTime(), true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState == 4 && xhr.status == 200) {
                    ALL = eval('(' + xhr.responseText + ')');
                    document.getElementById('status').innerHTML = "系統就緒";
                }
            };
            xhr.send();
        };

        function doSearch() {
            var val = document.getElementById('q').value.toUpperCase();
            if(!val) { renderEmpty(); return; }
            var q = val.split(' ');
            CUR = [];
            for (var i = 0; i < ALL.length; i++) {
                var r = ALL[i], t = (r[0]+r[1]+r[2]+r[3]).toUpperCase(), m = true;
                for (var j = 0; j < q.length; j++) { if (t.indexOf(q[j]) == -1) { m = false; break; } }
                if (m) { CUR.push(r); if (CUR.length >= 100) break; }
            }
            render();
            window.scrollTo(0,0);
        }

        function sort(idx) {
            if(CUR.length == 0) return;
            var f = DIR[idx];
            CUR.sort(function(a, b) {
                var vA = a[idx], vB = b[idx];
                return (isNaN(vA) ? vA.localeCompare(vB) : (vA - vB)) * f;
            });
            DIR[idx] *= -1;
            render();
        }

        function render() {
            var h = '', q = document.getElementById('q').value.toUpperCase().split(' ');
            for (var i = 0; i < CUR.length; i++) {
                var r = CUR[i], name = r[3];
                for(var j=0; j<q.length; j++) {
                    if(q[j]) name = name.replace(new RegExp("("+q[j]+")", "gi"), '<span class="highlight">$1</span>');
                }
                h += '<div class="item-row">';
                h += '<div class="item-name">' + name + '</div>';
                h += '<div class="meta-line">';
                h += '<div class="v-dept">' + r[0] + '</div>';
                h += '<div class="v-global">' + r[1] + '</div>';
                h += '<div class="v-store">' + r[2] + '</div>';
                h += '</div></div>';
            }
            document.getElementById('results').innerHTML = h;
            document.getElementById('status').innerHTML = "結果: " + CUR.length + " 筆";
        }

        function renderEmpty() {
            document.getElementById('results').innerHTML = "";
            document.getElementById('status').innerHTML = "系統就緒";
        }
    </script>
</head>
<body>
    <div class="sticky-header">
        <div class="search-box">
            <input type="text" id="q" onkeypress="if(event.keyCode==13) doSearch();" placeholder="搜尋...">
            <button class="btn-search" onclick="doSearch()">查詢</button>
        </div>
        <div class="sort-row">
            <button class="sort-btn" onclick="sort(0)">部門 ↕</button>
            <button class="sort-btn" onclick="sort(1)">國碼 ↕</button>
            <button class="sort-btn" onclick="sort(2)">店碼 ↕</button>
            <button class="sort-btn" onclick="sort(3)">品名 ↕</button>
        </div>
        <div id="status" class="status-bar">系統載入中...</div>
    </div>
    <div id="results"></div>
</body>
</html>
