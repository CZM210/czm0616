<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>商品查詢器-權重修正版 v3.5</title>
    <style>
        :root { --poya: #d63384; --border: #eee; --bg-memo: #fffde7; }
        body { font-family: "微軟正黑體", sans-serif; background: #fff; margin: 0; padding: 0; }
        .sticky-header { position: sticky; top: 0; background: #fff; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .search-box { display: flex; padding: 8px; }
        input { flex: 1; padding: 10px; font-size: 18px; border: 1px solid #ccc; border-radius: 4px; outline: none; }
        .btn-main { padding: 0 15px; background: var(--poya); color: white; border: none; border-radius: 4px; font-weight: bold; margin-left: 5px; }
        .nav-row { display: flex; background: #fff; border-bottom: 2px solid var(--poya); }
        .nav-btn { flex: 1; padding: 12px 0; font-size: 15px; color: #666; border: none; background: none; font-weight: bold; cursor: pointer; text-align: center; }
        .nav-btn.active { color: var(--poya); background: #fdf2f7; }
        .sort-row { display: flex; background: var(--poya); padding: 5px 0; }
        .sort-btn { flex: 1; padding: 6px 0; font-size: 13px; color: white; border: none; background: none; font-weight: bold; }
        .item-row { padding: 12px 15px; border-bottom: 1px solid var(--border); position: relative; background: #fff; }
        .item-name { font-size: 16px; font-weight: bold; color: #000; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; margin-bottom: 4px; width: 85%; }
        .meta-line { font-size: 14px; color: #666; font-family: monospace; display: flex; gap: 15px; }
        .btn-save { position: absolute; right: 15px; top: 12px; background: var(--poya); color: #fff; border: none; padding: 6px 12px; border-radius: 4px; font-size: 12px; }
        .btn-save.done { background: #4caf50; }
        .highlight { color: var(--poya); background: #fff9c4; font-weight: bold; }
        .hidden { display: none; }
        .sim-val { color: var(--poya); font-weight: bold; }
    </style>
</head>
<body>
    <div class="sticky-header">
        <div class="search-box">
            <input type="text" id="q" onkeypress="if(event.keyCode==13) doSearch();" placeholder="搜尋關鍵字..">
            <button class="btn-main" onclick="doSearch()">查詢</button>
        </div>
        <div class="nav-row">
            <button id="tab-search" class="nav-btn active" onclick="switchTab('search')">搜尋結果</button>
            <button id="tab-memo" class="nav-btn" onclick="switchTab('memo')">暫存清單 (<span id="memo-count">0</span>)</button>
        </div>
        <div id="ui-search-header">
            <div class="sort-row">
                <button class="sort-btn" onclick="sort(0)">部門 ↕</button>
                <button class="sort-btn" onclick="sort(1)">國碼 ↕</button>
                <button class="sort-btn" onclick="sort(2)">相似度 ↕</button>
                <button class="sort-btn" onclick="sort(3)">品名 ↕</button>
            </div>
            <div id="status" class="status-bar">就緒</div>
        </div>
    </div>
    <div id="view-search"></div>
    <div id="view-memo" class="hidden"></div>

    <script type="text/javascript">
        var ALL = [], CUR = [], DIR = [1, 1, 1, 1];
        var MEMO = JSON.parse(localStorage.getItem('poya_v6') || '{}');
        
        var OLD_GAS_URL = "https://script.google.com/macros/s/AKfycbwPPvJqCN9WFnWCAW6TBWBBZNsQSlUWIouQcx8cR0OxFx_VNhghmBpVAeEs11xy_k22Tg/exec";
        var NEW_GAS_URL = "https://script.google.com/macros/s/AKfycbxa4ScSnIdj3RSWkGLY7w98UUCn5oHQf-Gx0Pp9UO6fDjMlOjWxWt9gUttekXVtc2fHmg/exec";

        window.onload = function() {
            var DATA_VERSION = "20260405_v3.5"; 
            var xhr = new XMLHttpRequest();
            xhr.open('GET', 'data.json?v=' + DATA_VERSION, true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState == 4 && xhr.status == 200) {
                    ALL = JSON.parse(xhr.responseText);
                    document.getElementById('status').innerHTML = "系統就緒 (" + DATA_VERSION + ")";
                }
            };
            xhr.send();
            updateBadge();
        };

        // --- 核心進化：嚴格塊狀比對演算法 ---
        function calculateSmartRank(userInput, itemName) {
            var query = userInput.trim().toLowerCase();
            var name = itemName.toLowerCase();
            var cleanQuery = query.replace(/[\s\+\-\/\(\)]+/g, '');
            var cleanName = name.replace(/[\s\+\-\/\(\)]+/g, '');

            if (!cleanQuery) return { score: 0, ratio: 0 };

            // 1. 完全連續命中 (絕對最高分)
            var directIdx = cleanName.indexOf(cleanQuery);
            if (directIdx !== -1) {
                return { score: 1000 - (cleanName.length * 0.1), ratio: 1.0 };
            }

            // 2. 英文與數字塊保護：將搜尋詞拆解成「中文塊」與「英文數字塊」
            var segments = query.match(/[\u4E00-\u9FA5]+|[a-z0-9]+/g);
            if (!segments) return { score: 0, ratio: 0 };

            var totalMatchLen = 0;
            var lastIdx = -1;
            var totalDist = 0;

            for (var i = 0; i < segments.length; i++) {
                var seg = segments[i];
                var foundIdx = cleanName.indexOf(seg, lastIdx + 1);
                
                // 如果是英文或數字塊，必須完整出現
                if (foundIdx === -1) return { score: 0, ratio: 0 }; 

                if (lastIdx !== -1) totalDist += (foundIdx - lastIdx);
                totalMatchLen += seg.length;
                lastIdx = foundIdx;
            }

            // 只有當所有區塊（特別是英文塊）都命中的情況下才計算分值
            var ratio = totalMatchLen / cleanQuery.length;
            var compactness = (segments.length > 1) ? (segments.length - 1) / totalDist : 1;
            
            // 分散命中降權，連續命中升權
            var finalScore = (totalMatchLen * 10) * compactness;
            var finalRatio = ratio * (compactness > 0.8 ? 1.0 : compactness);

            return { score: finalScore, ratio: finalRatio };
        }

        async function sendLog(q, count) {
            var userIp = "偵測失敗";
            try {
                var response = await fetch('https://api.ipify.org?format=json');
                var data = await response.json();
                userIp = data.ip;
            } catch (e) { console.log("IP偵測跳過"); }
            var agent = navigator.userAgent.substring(0, 50);
            var oldUrl = OLD_GAS_URL + "?q=" + encodeURIComponent(q) + "&count=" + count + "&ip=" + userIp + "&agent=" + encodeURIComponent(agent);
            var newUrl = NEW_GAS_URL + "?action=record&type=執行搜尋&content=" + encodeURIComponent("關鍵字: [" + q + "] - 結果: " + count + " 筆 - IP: " + userIp);
            var img1 = new Image(); img1.src = oldUrl;
            var img2 = new Image(); img2.src = newUrl;
        }

        function doSearch() {
            var val = document.getElementById('q').value.trim();
            if(!val) return;
            
            CUR = [];
            for (var i = 0; i < ALL.length; i++) {
                var r = ALL[i];
                var res = calculateSmartRank(val, r[3]);
                if (res.score > 0) {
                    var entry = r.slice();
                    entry[2] = Math.round(res.ratio * 100) + '%';
                    entry.push(res.score); 
                    entry.push(res.ratio); 
                    CUR.push(entry);
                }
            }
            CUR.sort(function(a, b) { return b[4] - a[4]; });
            renderSearchPage();
            window.scrollTo(0,0);
            sendLog(val, CUR.length); 
        }

        function renderSearchPage() {
            var h = '', searchVal = document.getElementById('q').value.trim();
            var q = searchVal.replace(/[\+\-\/\(\)]+/g, ' ').split(/\s+/);
            
            for (var i = 0; i < CUR.length; i++) {
                var r = CUR[i], name = r[3], simText = r[2];
                for(var j=0; j<q.length; j++) { 
                    if(q[j] && q[j].length > 0) {
                        var safeQ = q[j].replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                        name = name.replace(new RegExp("("+safeQ+")", "gi"), '<span class="highlight">$1</span>'); 
                    }
                }
                var isSaved = MEMO[r[1]] ? 'done' : '';
                h += '<div class="item-row">';
                h += '<span class="item-name">' + name + '</span>';
                h += '<div class="meta-line"><div>' + r[0] + '</div><div>' + r[1] + '</div><div class="sim-val">權重相似度: ' + simText + '</div></div>';
                h += '<button class="btn-save '+isSaved+'" onclick="save('+i+', this)">'+(MEMO[r[1]]?'已存':'暫存')+'</button>';
                h += '</div>';
            }
            document.getElementById('view-search').innerHTML = h || '<div style="padding:50px;text-align:center;color:#999;">查無結果</div>';
            document.getElementById('status').innerHTML = "搜尋結果: " + CUR.length + " 筆";
        }

        function save(idx, btn) {
            var r = CUR[idx];
            if(!MEMO[r[1]]) {
                MEMO[r[1]] = { d: r[0], g: r[1], s: r[2], n: r[3], note: "" };
                localStorage.setItem('poya_v6', JSON.stringify(MEMO));
                updateBadge();
                btn.innerHTML = "已存"; btn.classList.add('done');
            }
        }

        function updateBadge() { document.getElementById('memo-count').innerHTML = Object.keys(MEMO).length; }

        function switchTab(m) {
            if(m === 'search') {
                document.getElementById('ui-search-header').classList.remove('hidden');
                document.getElementById('tab-search').classList.add('active');
                document.getElementById('tab-memo').classList.remove('active');
                document.getElementById('view-search').classList.remove('hidden');
                document.getElementById('view-memo').classList.add('hidden');
            } else {
                document.getElementById('ui-search-header').classList.add('hidden');
                document.getElementById('tab-memo').classList.add('active');
                document.getElementById('tab-search').classList.remove('active');
                document.getElementById('view-search').classList.add('hidden');
                document.getElementById('view-memo').classList.remove('hidden');
                renderMemoPage();
            }
        }

        function renderMemoPage() {
            var h = '', keys = Object.keys(MEMO);
            if(keys.length === 0) h = '<div style="padding:50px;text-align:center;color:#999;">暫存清單是空的</div>';
            for (var i = 0; i < keys.length; i++) {
                var r = MEMO[keys[i]];
                h += '<div class="memo-row">';
                h += '<span class="item-name" style="width:100%">' + r.n + '</span>';
                h += '<div class="meta-line"><div>' + r.d + '</div><div>' + r.g + '</div></div>';
                h += '<button class="btn-remove" onclick="remove(\''+r.g+'\')">移除</button></div>';
            }
            document.getElementById('view-memo').innerHTML = h;
        }

        function remove(id) { if(confirm('確定移除？')) { delete MEMO[id]; localStorage.setItem('poya_v6', JSON.stringify(MEMO)); updateBadge(); renderMemoPage(); } }

        function sort(idx) {
            if(CUR.length == 0) return;
            var f = DIR[idx];
            CUR.sort(function(a, b) { 
                var vA = a[idx], vB = b[idx]; 
                if(!isNaN(parseFloat(vA)) && !isNaN(parseFloat(vB))) return (parseFloat(vA) - parseFloat(vB)) * f;
                return String(vA).localeCompare(String(vB)) * f;
            });
            DIR[idx] *= -1;
            renderSearchPage();
        }
    </script>
</body>
</html>
